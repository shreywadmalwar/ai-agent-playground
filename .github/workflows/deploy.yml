# Builds the app and deploys it to GitHub Pages on every push to main.
#
# API keys come from GitHub Actions secrets (repo Settings → Secrets and
# variables → Actions), injected as env vars at build time. They still end
# up in the public JS bundle - that's unavoidable on a static host - but
# they never touch git history, so rotating a key is just updating the
# secret and re-running the workflow.

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: # manual "Run workflow" button, handy after rotating keys

permissions:
  contents: read
  pages: write
  id-token: write

# Don't pile up deploys - a new push cancels the in-flight one.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build
        env:
          # Only ship the keys you're comfortable making public.
          # Gemini: referrer-restrict it in Google Cloud Console first.
          # OpenAI is intentionally absent - paid keys must never ship;
          # visitors enter their own via the Settings panel.
          VITE_GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          VITE_GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          VITE_CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          VITE_OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          VITE_MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          VITE_COHERE_API_KEY: ${{ secrets.COHERE_API_KEY }}

      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
